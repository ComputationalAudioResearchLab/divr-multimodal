run_name: qwen2audio_lora
seed: 42

dataset:
  name: femh_1_test
  task_dir: tasks/femh_1_test
  train_file: train.yml
  val_file: val.yml
  test_file: test.yml
  labels: []

model:
  name: Qwen/Qwen2-Audio-7B-Instruct
  trust_remote_code: true
  device_map: auto
  torch_dtype: float16
  low_cpu_mem_usage: true
  max_memory:
  attn_implementation:
  cache_dir:

quantization:
  load_in_4bit: true
  load_in_8bit: false
  llm_int8_enable_fp32_cpu_offload: false
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: float16
  bnb_4bit_use_double_quant: true

lora:
  r: 4
  alpha: 8
  dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - v_proj

data:
  max_length: 128
  max_audio_seconds: 3
  max_audios_per_sample: 1

prompt:
  system: You are an expert assistant for voice disorder classification.
  user_template: |
    Classify the speaker's voice disorder from the audio and metadata.
    Return only one label from: {labels}.
    Metadata: {text}

training:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  weight_decay: 0.0
  warmup_ratio: 0.03
  logging_steps: 10
  eval_strategy: "no"
  eval_steps: 100
  save_strategy: steps
  save_steps: 100
  save_total_limit: 2
  optim: paged_adamw_8bit
  gradient_checkpointing: true
  torch_empty_cache_steps: 1
  bf16: false
  fp16: true
  report_to: []
  resume_from_checkpoint:

generation:
  max_new_tokens: 8
  do_sample: false
  temperature:
  top_p:

evaluation:
  batch_size: 1
  adapter_path:

analysis_dir: analysis
